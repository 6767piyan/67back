<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>史楚普效應實驗 - 受試者中央管理後台</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #0f111a; color: #ffffff; margin: 0; padding: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2d334a; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: #4dadff; margin: 0; font-size: 28px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-csv { background-color: #28a745; box-shadow: 0 4px 15px rgba(40,167,69,0.3); }
        .btn-csv:hover { background-color: #218838; transform: translateY(-2px); }
        .btn-clear { background-color: #dc3545; box-shadow: 0 4px 15px rgba(220,53,69,0.3); }
        .btn-clear:hover { background-color: #bd2130; transform: translateY(-2px); }
        
        .btn-action { color: white; border: none; padding: 6px 14px; font-size: 13px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .btn-detail { background-color: #007bff; }
        .btn-detail:hover { background-color: #0056b3; }
        .btn-delete { background-color: #e44d5d; }
        .btn-delete:hover { background-color: #bd2130; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background-color: #1a1d29; border: 1px solid #2d334a; border-radius: 12px; padding: 20px; text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #cdcefe; font-size: 16px; }
        .card .value { font-size: 32px; font-weight: bold; color: #00ffcc; }

        .table-container { background-color: #1a1d29; border: 1px solid #2d334a; border-radius: 12px; overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 20px; border-bottom: 1px solid #2d334a; }
        th { background-color: #24293c; color: #4dadff; font-weight: bold; }
        tr:hover { background-color: #1f2335; }

        /* 彈出視窗樣式 */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); overflow-y: auto; }
        .modal-content { background-color: #1a1d29; margin: 5% auto; padding: 30px; border-radius: 16px; max-width: 900px; border: 2px solid #4dadff; }
        .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-modal:hover { color: #fff; }
        .modal-table { width: 100%; margin-top: 20px; }
        .modal-table th { background-color: #131622; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8n5tXK2ObAWT9KU5j8I3FWtC2SWxQi9U",
            authDomain: "stroop-8b787.firebaseapp.com",
            databaseURL: "https://stroop-8b787-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "stroop-8b787",
            storageBucket: "stroop-8b787.firebasestorage.app",
            messagingSenderId: "880652461108",
            appId: "1:880652461108:web:e14317f54e46454ed31661",
            measurementId: "G-MVT8W43KLX"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let userPackages = []; 

        window.onload = function() {
            // 監聽按人頭打包的全新目錄
            database.ref('stroop_user_packages').on('value', (snapshot) => {
                const data = snapshot.val();
                userPackages = [];

                if (data) {
                    Object.keys(data).forEach(key => {
                        let pkg = data[key];
                        pkg.firebaseKey = key; 
                        userPackages.push(pkg);
                    });
                    userPackages.reverse(); 
                }
                
                calculateSummary(userPackages);
                renderUserTable(userPackages);
            });
        };

        function calculateSummary(packages) {
            document.getElementById('metric-count').innerText = packages.length;
            const totalTrials = packages.reduce((acc, p) => acc + (p.TotalTrials || 0), 0);
            document.getElementById('metric-total-trials').innerText = totalTrials;
            
            const rts = packages.map(p => p.AverageRT_ms).filter(rt => rt > 0);
            const globalAvgRT = rts.length > 0 ? Math.round(rts.reduce((a,b)=>a+b,0) / rts.length) : 0;
            document.getElementById('metric-global-rt').innerText = globalAvgRT + " ms";
        }

        function renderUserTable(packages) {
            const tbody = document.getElementById('user-tbody');
            tbody.innerHTML = '';

            if (packages.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 20px;">目前沒有受試者數據。</td></tr>`;
                return;
            }

            packages.forEach(pkg => {
                let tr = document.createElement('tr');
                let formattedTime = new Date(pkg.TestedAt).toLocaleString('zh-TW', {timeZone: 'Asia/Taipei'});
                
                tr.innerHTML = `
                    <td><b>${pkg.Username}</b></td>
                    <td>${formattedTime}</td>
                    <td>${pkg.TotalTrials} 題</td>
                    <td style="color:#00ffcc; font-weight:bold;">${pkg.OverallAccuracy}</td>
                    <td><b>${pkg.AverageRT_ms}</b> ms</td>
                    <td>
                        <button class="btn-action btn-detail" onclick="viewDetails('${pkg.firebaseKey}')">展開詳細 99 題</button>
                        <button class="btn-action btn-delete" onclick="deleteUserPackage('${pkg.firebaseKey}')">刪除此人</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 🔍 彈出視窗查看 99 題細節
        function viewDetails(key) {
            const targetUser = userPackages.find(p => p.firebaseKey === key);
            if (!targetUser || !targetUser.RawDetails) return;

            document.getElementById('modal-username').innerText = targetUser.Username;
            const modalBody = document.getElementById('modal-tbody');
            modalBody.innerHTML = '';

            const typeMapping = { 'word': '字形', 'audio': '聲音', 'color': '顏色' };

            targetUser.RawDetails.forEach(t => {
                let tr = document.createElement('tr');
                let accText = t.Response === 'Timeout' ? '<span style="color:#ffb74d">超時</span>' : (t.Accuracy === 1 ? '<span style="color:#33FF33">正確</span>' : '<span style="color:#FF4A4A">錯誤</span>');
                tr.innerHTML = `
                    <td>第 ${t.Trial} 題</td>
                    <td>${typeMapping[t.PhaseType]}</td>
                    <td>${t.Congruency === 'Congruent' ? '一致' : '不一致'}</td>
                    <td>${t.Word} / ${t.Color} / 🔊${t.Audio}</td>
                    <td>${t.Response === 'Timeout' ? '-' : t.Response}</td>
                    <td>${accText}</td>
                    <td>${t.RT_ms} ms</td>
                `;
                modalBody.appendChild(tr);
            });

            document.getElementById('detail-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
        }

        // 🔥 刪除單個受試者（連同他的 99 題細節整包拔除）
        function deleteUserPackage(key) {
            if (confirm("⚠️ 確定要刪除這名受試者的整包數據嗎？此操作不可逆！")) {
                database.ref('stroop_user_packages').child(key).remove()
                    .then(() => alert("🎉 該受試者數據已完整刪除。"))
                    .catch(err => alert("刪除失敗: " + err.message));
            }
        }

        // 🔥 清空全體數據
        function clearAllDatabase() {
            if (confirm("🛑 【終極警告】您即將抹除全體受試者的所有數據！")) {
                if (prompt("請輸入大寫 CLEAR 執行清理：") === "CLEAR") {
                    database.ref('stroop_user_packages').remove()
                        .then(() => alert("🧹 資料庫已全面清空！"))
                        .catch(err => alert("清空失敗: " + err.message));
                }
            }
        }

        // 📥 匯出全體大表格（會自動把所有人的 99 題全部解開，平鋪輸出成適合統計軟體的巨大 Excel CSV 檔）
        function exportMasterCSV() {
            if (userPackages.length === 0) { alert("沒有數據可以導出！"); return; }
            let csvContent = '\uFEFF受試者代號,完成時間,階段任務,試次,一致性,字面,顏色,聲音,受試者反應,是否正確,反應時間(ms)\n';
            
            [...userPackages].reverse().forEach(pkg => {
                let formattedTime = new Date(pkg.TestedAt).toLocaleString('zh-TW', {timeZone: 'Asia/Taipei'}).replace(/,/g, '');
                if (pkg.RawDetails) {
                    pkg.RawDetails.forEach(t => {
                        csvContent += `"${pkg.Username}","${formattedTime}",${t.PhaseType},${t.Trial},${t.Congruency},${t.Word},${t.Color},${t.Audio},${t.Response},${t.Accuracy},${t.RT_ms}\n`;
                    });
                }
            });

            let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            let url = URL.createObjectURL(blob);
            let link = document.createElement("a");
            link.href = url; link.download = `Stroop_全體解包數據_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>🧠 史楚普效應實驗 - 受試者中央管理後台</h1>
            <p style="color: #cdcefe; margin: 5px 0 0 0;">結構模式：👤 以人為單位獨立打包 ｜ 清爽無雜訊</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-csv" onclick="exportMasterCSV()">📥 匯出全體解包數據 (CSV)</button>
            <button class="btn btn-clear" onclick="clearAllDatabase()">💥 清空整個資料庫</button>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="card"><h3>已收集受試者總數</h3><div class="value" id="metric-count">0</div></div>
        <div class="card"><h3>總計安全存檔試次</h3><div class="value" id="metric-total-trials">0</div></div>
        <div class="card"><h3>全體跨受試者平均反應時</h3><div class="value" id="metric-global-rt">0 ms</div></div>
    </div>

    <h2>👥 受試者清單</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>受試者代號</th><th>實驗完成時間</th><th>總試次</th><th>總體正確率</th><th>平均反應時間</th><th>管理操作</th>
                </tr>
            </thead>
            <tbody id="user-tbody">
                <tr><td colspan="6" style="text-align:center; color:#cdcefe; padding:30px;">雲端資料庫同步連線中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2>📊 受試者 [<span id="modal-username" style="color:#00ffcc"></span>] 完整 99 題刺激反應細節</h2>
        <div class="table-container" style="max-height: 500px; overflow-y: auto;">
            <table class="modal-table">
                <thead>
                    <tr><th>試次</th><th>任務類型</th><th>一致性</th><th>刺激特徵 (字/色/音)</th><th>受試者反應</th><th>判定</th><th>反應時間</th></tr>
                </thead>
                <tbody id="modal-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
