<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop 數據觀測端</title>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; padding: 30px; }
        .container { max-width: 800px; margin: auto; background: #1a1d29; padding: 20px; border-radius: 12px; }
        .log-item { background: #24293c; padding: 10px 15px; margin: 10px 0; border-left: 5px solid #00ffcc; border-radius: 4px; }
        #error-box { background: #ff4a4a; color: white; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8n5tXK2ObAWT9KU5j8I3FWtC2SWxQi9U",
            authDomain: "stroop-8b787.firebaseapp.com",
            databaseURL: "https://stroop-8b787-default-rtdb.firebaseio.com",
            projectId: "stroop-8b787"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        window.onload = function() {
            database.ref('stroop_results').on('value', (snapshot) => {
                const data = snapshot.val();
                const listDiv = document.getElementById('log-list');
                listDiv.innerHTML = "";
                
                if (data) {
                    document.getElementById('count').innerText = Object.keys(data).length;
                    Object.keys(data).reverse().forEach(key => {
                        const item = data[key];
                        listDiv.innerHTML += `
                            <div class="log-item">
                                <b>時間:</b> ${item.Timestamp.slice(11, 19)} | 
                                <b>名字:</b> ${item.Username} | 
                                <b>動作:</b> ${item.Response}
                            </div>`;
                    });
                } else {
                    document.getElementById('count').innerText = "0";
                    listDiv.innerHTML = "<p style='color:#aaa;'>目前資料庫空空如也...</p>";
                }
            }, (error) => {
                document.getElementById('error-box').style.display = "block";
                document.getElementById('error-box').innerHTML = `❌ 後台讀取失敗！原因：${error.message}`;
            });
        };
    </script>
</head>
<body>
    <div class="container">
        <h2>測試 2：後台即時數據監測</h2>
        <div id="error-box"></div>
        <h3>目前雲端總筆數：<span id="count" style="color:#00ffcc;">0</span> 筆</h3>
        <hr style="border-color:#3d4465;">
        <div id="log-list">正在連線資料庫...</div>
    </div>
</body>
</html>
